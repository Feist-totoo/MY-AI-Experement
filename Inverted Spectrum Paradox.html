<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>色盲悖论实验工具 - 本地预览版</title>
    <!-- 引入 React 核心库 -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- 引入 Babel 用于转译 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 引入 Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Lucide 图标库 -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* 简单处理 range 输入框样式 */
        input[type=range] { -webkit-appearance: none; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%; background: currentColor; cursor: pointer; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // 简易版 Lucide 图标组件 (由于 CDN 方式不同)
        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [baseR, setBaseR] = useState(100);
            const [baseG, setBaseG] = useState(150);
            const [baseB, setBaseB] = useState(80);
            const [swapMode, setSwapMode] = useState('none');

            const spectrumPoints = useMemo(() => {
                const points = [];
                for (let i = 0; i <= 100; i++) {
                    const p = i / 100;
                    let r = 0, g = 0, b = 0;
                    if (p < 0.25) { r = 255; g = (p / 0.25) * 255; }
                    else if (p < 0.5) { r = 255 - ((p - 0.25) / 0.25) * 255; g = 255; }
                    else if (p < 0.75) { g = 255; b = ((p - 0.5) / 0.25) * 255; }
                    else { g = 255 - ((p - 0.75) / 0.25) * 255; b = 255; }

                    const adjR = Math.min(255, (r * baseR) / 100);
                    const adjG = Math.min(255, (g * baseG) / 100);
                    const adjB = Math.min(255, (b * baseB) / 100);
                    points.push({ p, r: adjR, g: adjG, b: adjB });
                }
                return points;
            }, [baseR, baseG, baseB]);

            const renderColor = (r, g, b) => {
                let fr = r, fg = g, fb = b;
                if (swapMode === 'rb') [fr, fb] = [b, r];
                else if (swapMode === 'rg') [fr, fg] = [g, r];
                else if (swapMode === 'gb') [fg, fb] = [b, g];
                return `rgb(${Math.round(fr)}, ${Math.round(fg)}, ${Math.round(fb)})`;
            };

            const gradientStyle = {
                background: `linear-gradient(to right, ${spectrumPoints.map(pt => `${renderColor(pt.r, pt.g, pt.b)} ${pt.p * 100}%`).join(', ')})`
            };

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-6xl mx-auto">
                        <header className="mb-8 text-center">
                            <h1 className="text-3xl font-bold text-slate-800 flex items-center justify-center gap-2">
                                <Icon name="palette" className="text-indigo-600" /> 色盲悖论实验工具
                            </h1>
                        </header>
                        <div className="grid grid-cols-1 lg:grid-cols-4 gap-8">
                            <div className="space-y-6">
                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                                    <h2 className="text-lg font-semibold mb-4 text-slate-700">物理基值</h2>
                                    <div className="space-y-4">
                                        {['R', 'G', 'B'].map((c, i) => (
                                            <div key={c}>
                                                <label className="flex justify-between text-xs font-bold mb-1 uppercase">
                                                    <span>{c === 'R' ? '红' : c === 'G' ? '绿' : '蓝'}</span>
                                                    <span>{[baseR, baseG, baseB][i]}%</span>
                                                </label>
                                                <input type="range" min="0" max="200" 
                                                    value={[baseR, baseG, baseB][i]} 
                                                    onChange={(e) => [setBaseR, setBaseG, setBaseB][i](Number(e.target.value))} 
                                                    className={`w-full text-${['red', 'green', 'blue'][i]}-500`}
                                                />
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                                    <h2 className="text-lg font-semibold mb-4 text-slate-700">反转模式</h2>
                                    <div className="flex flex-col gap-2">
                                        {[['none', '正常'], ['rb', '红 ↔ 蓝'], ['rg', '红 ↔ 绿'], ['gb', '绿 ↔ 蓝']].map(([id, label]) => (
                                            <button key={id} onClick={() => setSwapMode(id)}
                                                className={`p-3 rounded-xl text-sm font-bold transition-all ${swapMode === id ? 'bg-indigo-600 text-white' : 'bg-slate-50'}`}>
                                                {label}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            </div>
                            <div className="lg:col-span-3 space-y-8">
                                <div className="bg-white p-8 rounded-3xl shadow-sm border border-slate-200">
                                    <div className="w-full h-40 rounded-2xl shadow-inner mb-6" style={gradientStyle}></div>
                                    <p className="text-sm text-slate-500 text-center italic">注：物理标签（400nm-700nm）始终固定，背景渐变随模式变化。</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
